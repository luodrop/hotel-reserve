<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<!-- HEAD -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">HotelReserve</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<!-- NAVBAR -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <i class="bi bi-building me-2 fs-4"></i>
            <span class="fw-bold">HotelReserve</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-house-door me-1"></i>首页</a></li>
                <li class="nav-item" th:if="${currentUser != null and currentUser.role == 'USER'}">
                    <a class="nav-link" th:href="@{/user/home}"><i class="bi bi-person me-1"></i>我的预约</a>
                </li>
                <li class="nav-item" th:if="${currentUser != null and currentUser.role == 'ADMIN'}">
                    <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-1"></i>管理后台</a>
                </li>
            </ul>
            <ul class="navbar-nav">
                <li class="nav-item" th:if="${currentUser == null}">
                    <a class="nav-link" th:href="@{/login}"><i class="bi bi-box-arrow-in-right me-1"></i>登录</a>
                </li>
                <li class="nav-item" th:if="${currentUser == null}">
                    <a class="nav-link" th:href="@{/register}"><i class="bi bi-person-plus me-1"></i>注册</a>
                </li>
                <li class="nav-item dropdown" th:if="${currentUser != null}">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>[[${currentUser.username}]]
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li th:if="${currentUser.role == 'USER'}">
                            <a class="dropdown-item" th:href="@{/user/profile}"><i class="bi bi-gear me-2"></i>个人信息</a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" th:href="@{/logout}"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- FLASH MESSAGES -->
<div th:fragment="flash" th:if="${flashMessage != null}">
    <div th:classappend="'alert alert-' + ${flashType} + ' alert-dismissible fade show m-0'" role="alert">
        <i th:classappend="'bi me-2 ' + (${flashType == 'success'} ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill')"></i>
        [[${flashMessage}]]
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- FOOTER -->
<footer th:fragment="footer" class="bg-dark text-light py-4 mt-auto">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h5 class="mb-3"><i class="bi bi-building me-2"></i>HotelReserve 酒店预约管理系统</h5>
                <p class="text-secondary mb-0">高级Spring Boot期末设计作品 · 基于 Java + Spring Boot + Thymeleaf</p>
            </div>
            <div class="col-md-6 text-md-end">
                <p class="text-secondary mb-0">&copy; 2026 HotelReserve. All rights reserved.</p>
            </div>
        </div>
    </div>
</footer>

<!-- SCRIPTS -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
</div>
</html>
