<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: head('注册 - 酒店预约管理系统')"></head>
<body>
    <nav th:replace="fragments/common :: navbar"></nav>
    <div th:replace="fragments/common :: flash"></div>

    <div class="auth-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card auth-card shadow-lg border-0">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="auth-icon mb-3"><i class="bi bi-person-plus fs-1"></i></div>
                                <h3 class="fw-bold">用户注册</h3>
                                <p class="text-muted">创建您的账号</p>
                            </div>
                            <form th:action="@{/register}" method="post">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label"><i class="bi bi-person me-1"></i>用户名 <span class="text-danger">*</span></label>
                                        <input type="text" name="username" class="form-control" placeholder="登录用户名" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label"><i class="bi bi-card-text me-1"></i>真实姓名</label>
                                        <input type="text" name="realName" class="form-control" placeholder="您的姓名">
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label"><i class="bi bi-lock me-1"></i>密码 <span class="text-danger">*</span></label>
                                        <input type="password" name="password" class="form-control" placeholder="至少6位密码" required minlength="6">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label"><i class="bi bi-lock-fill me-1"></i>确认密码 <span class="text-danger">*</span></label>
                                        <input type="password" name="confirmPassword" class="form-control" placeholder="再次输入密码" required>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label"><i class="bi bi-telephone me-1"></i>手机号码</label>
                                    <input type="tel" name="phone" class="form-control" placeholder="11位手机号">
                                </div>
                                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3"><i class="bi bi-person-check me-2"></i>注 册</button>
                                <div class="text-center"><span class="text-muted">已有账号？</span><a th:href="@{/login}" class="text-primary fw-bold text-decoration-none">立即登录</a></div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/common :: footer"></footer>
    <div th:replace="fragments/common :: scripts"></div>
</body>
</html>
