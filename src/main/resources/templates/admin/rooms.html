<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: head('房型管理 - 管理后台')"></head>
<body>
    <nav th:replace="fragments/common :: navbar"></nav>
    <div th:replace="fragments/common :: flash"></div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0"><div th:replace="admin/sidebar :: sidebar"></div></div>
            <div class="col-md-10 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="fw-bold mb-1"><i class="bi bi-door-open me-2 text-primary"></i>房型管理</h4>
                        <p class="text-muted mb-0">酒店：<strong th:text="${hotel.name}">酒店名</strong></p>
                    </div>
                    <div>
                        <a th:href="@{/admin/hotels}" class="btn btn-outline-secondary rounded-pill me-2"><i class="bi bi-arrow-left me-1"></i>返回</a>
                        <button class="btn btn-primary rounded-pill" data-bs-toggle="modal" data-bs-target="#roomModal" onclick="clearRoomForm()"><i class="bi bi-plus-lg me-1"></i>添加房型</button>
                    </div>
                </div>
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr><th>ID</th><th>图片</th><th>房型名称</th><th>价格(元/晚)</th><th>可住人数</th><th>操作</th></tr>
                                </thead>
                                <tbody>
                                    <tr th:each="room : ${rooms}">
                                        <td>[[${room.id}]]</td>
                                        <td>
                                            <img th:if="${room.image != null and !room.image.isEmpty()}" th:src="${room.image}" style="width: 60px; height: 40px; object-fit: cover; border-radius: 4px;">
                                            <span th:if="${room.image == null or room.image.isEmpty()}" class="text-muted">无图</span>
                                        </td>
                                        <td class="fw-bold" th:text="${room.typeName}">房型</td>
                                        <td class="text-primary fw-bold" th:text="${fmt.apply(room.price)}">¥0</td>
                                        <td th:text="${room.capacity + '人'}">2人</td>
                                        <td>
                                            <button class="btn btn-outline-primary btn-sm rounded-pill edit-room-btn"
                                                    th:data-id="${room.id}"
                                                    th:data-typename="${room.typeName}"
                                                    th:data-price="${room.price}"
                                                    th:data-capacity="${room.capacity}"
                                                    th:data-description="${room.description}"
                                                    th:data-image="${room.image}"
                                                    data-bs-toggle="modal" data-bs-target="#roomModal"><i class="bi bi-pencil me-1"></i>编辑</button>
                                            <form th:action="@{/admin/rooms/delete/{id}(id=${room.id})}" method="post" style="display:inline">
                                                <input type="hidden" name="hotelId" th:value="${hotel.id}">
                                                <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="return confirm('确定删除此房型？')"><i class="bi bi-trash me-1"></i>删除</button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Room Modal -->
    <div class="modal fade" id="roomModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/rooms/save}" method="post">
                    <input type="hidden" name="hotelId" th:value="${hotel.id}">
                    <div class="modal-header bg-primary text-white">
                        <h5 class="modal-title"><i class="bi bi-door-open me-2"></i><span id="roomModalTitle">添加房型</span></h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <input type="hidden" name="id" id="roomId">
                        <div class="mb-3"><label class="form-label">房型名称 <span class="text-danger">*</span></label><input type="text" name="typeName" id="roomTypeName" class="form-control" required></div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6"><label class="form-label">价格(元/晚) <span class="text-danger">*</span></label><input type="number" name="price" id="roomPrice" class="form-control" step="0.01" required></div>
                            <div class="col-md-6"><label class="form-label">可住人数 <span class="text-danger">*</span></label><input type="number" name="capacity" id="roomCapacity" class="form-control" min="1" required></div>
                        </div>
                        <div class="mb-3"><label class="form-label">图片URL</label><input type="text" name="image" id="roomImage" class="form-control" placeholder="https://..."></div>
                        <div class="mb-3"><label class="form-label">描述</label><textarea name="description" id="roomDescription" class="form-control" rows="2"></textarea></div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/common :: footer"></footer>
    <div th:replace="fragments/common :: scripts"></div>
</body>
</html>
