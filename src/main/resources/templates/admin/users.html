<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: head('用户管理 - 管理后台')"></head>
<body>
    <nav th:replace="fragments/common :: navbar"></nav>
    <div th:replace="fragments/common :: flash"></div>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 p-0"><div th:replace="admin/sidebar :: sidebar"></div></div>
            <div class="col-md-10 p-4">
                <h4 class="fw-bold mb-4"><i class="bi bi-people me-2 text-primary"></i>用户管理</h4>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>用户名</th>
                                        <th>真实姓名</th>
                                        <th>手机号</th>
                                        <th>角色</th>
                                        <th>注册时间</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="u : ${users}">
                                        <td>[[${u.id}]]</td>
                                        <td class="fw-bold">[[${u.username}]]</td>
                                        <td>[[${u.realName != null ? u.realName : '-'}]]</td>
                                        <td>[[${u.phone != null ? u.phone : '-'}]]</td>
                                        <td>
                                            <span th:if="${u.role == 'ADMIN'}" class="badge bg-danger"><i class="bi bi-shield me-1"></i>管理员</span>
                                            <span th:if="${u.role == 'USER'}" class="badge bg-success"><i class="bi bi-person me-1"></i>用户</span>
                                        </td>
                                        <td>[[${#temporals.format(u.createdAt, 'yyyy-MM-dd HH:mm')}]]</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/common :: footer"></footer>
    <div th:replace="fragments/common :: scripts"></div>
</body>
</html>
