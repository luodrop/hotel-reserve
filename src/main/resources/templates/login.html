<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: head('登录 - 酒店预约管理系统')"></head>
<body>
    <nav th:replace="fragments/common :: navbar"></nav>
    <div th:replace="fragments/common :: flash"></div>

    <div class="auth-page">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card auth-card shadow-lg border-0">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="auth-icon mb-3"><i class="bi bi-building fs-1"></i></div>
                                <h3 class="fw-bold">欢迎登录</h3>
                                <p class="text-muted">酒店预约管理系统</p>
                            </div>
                            <form th:action="@{/login}" method="post">
                                <div class="mb-3">
                                    <label class="form-label"><i class="bi bi-person me-1"></i>用户名</label>
                                    <input type="text" name="username" class="form-control form-control-lg" placeholder="请输入用户名" required autofocus>
                                </div>
                                <div class="mb-4">
                                    <label class="form-label"><i class="bi bi-lock me-1"></i>密码</label>
                                    <input type="password" name="password" class="form-control form-control-lg" placeholder="请输入密码" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3"><i class="bi bi-box-arrow-in-right me-2"></i>登 录</button>
                                <div class="text-center"><span class="text-muted">还没有账号？</span><a th:href="@{/register}" class="text-primary fw-bold text-decoration-none">立即注册</a></div>
                            </form>
                            <div class="mt-4 p-3 bg-light rounded">
                                <p class="mb-1 small text-muted"><i class="bi bi-info-circle me-1"></i>测试账号：</p>
                                <p class="mb-0 small">
                                    <span class="badge bg-primary me-1">管理员</span> admin / admin123
                                    <span class="mx-2">|</span>
                                    <span class="badge bg-success me-1">用户</span> user / user123
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/common :: footer"></footer>
    <div th:replace="fragments/common :: scripts"></div>
</body>
</html>
