<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: head('支付 - 酒店预约管理系统')"></head>
<body>
    <nav th:replace="fragments/common :: navbar"></nav>
    <div th:replace="fragments/common :: flash"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4 text-center">
                        <div class="mb-4">
                            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                                <i class="bi bi-credit-card fs-1"></i>
                            </div>
                        </div>
                        <h4 class="fw-bold mb-2">确认支付</h4>
                        <p class="text-muted mb-4">请确认以下订单信息并完成支付</p>

                        <div class="bg-light rounded p-4 text-start mb-4">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">订单编号</span>
                                <span class="fw-bold">RSV[[${reservation.id}]]</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">入住日期</span>
                                <span>[[${reservation.checkIn}]]</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">退房日期</span>
                                <span>[[${reservation.checkOut}]]</span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between fw-bold fs-5">
                                <span>支付金额</span>
                                <span class="text-primary">&yen;[[${totalAmount}]]</span>
                            </div>
                        </div>

                       <!-- Alipay payment form (auto-submit) -->
                        <div th:if="${payHtml != null and !payHtml.isEmpty()}" th:utext="${payHtml}"></div>
                        <div th:if="${alipayError}" class="alert alert-warning text-center py-4 mb-0" role="alert">
                            <i class="bi bi-exclamation-triangle fs-3 d-block mb-2"></i>
                            <h5 class="alert-heading fw-bold mb-2">支付网关暂时不可用</h5>
                            <p class="mb-3" th:text="${alipayErrorMessage}">支付网关连接超时</p>
                            <hr>
                            <p class="mb-0">预约已成功创建，您可以前往<a th:href="@{/user/reservations}" class="alert-link">我的预约</a>稍后完成支付</p>
                        </div>

                       <div class="mt-3">
                            <a th:href="@{/user/home}" class="btn btn-outline-secondary rounded-pill">
                                <i class="bi bi-arrow-left me-1"></i>稍后支付
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="fragments/common :: footer"></footer>
    <div th:replace="fragments/common :: scripts"></div>
</body>
</html>
